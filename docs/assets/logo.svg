<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1689;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="helm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ADD8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065F46;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bg)" />
  <circle cx="60" cy="60" r="58" fill="none" stroke="#7C3AED" stroke-width="2" opacity="0.6"/>

  <!-- Kubernetes-style gear / helm wheel -->
  <g transform="translate(60,60)">
    <!-- Outer ring -->
    <circle r="36" fill="none" stroke="url(#helm)" stroke-width="5" opacity="0.9"/>
    <!-- Center hub -->
    <circle r="10" fill="url(#helm)" />
    <!-- Spokes (6) -->
    <line x1="0" y1="-10" x2="0" y2="-36" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <line x1="9" y1="5" x2="31" y2="18" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-9" y1="5" x2="-31" y2="18" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="10" x2="0" y2="36" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <line x1="-9" y1="-5" x2="-31" y2="-18" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <line x1="9" y1="-5" x2="31" y2="-18" stroke="#00ADD8" stroke-width="4" stroke-linecap="round"/>
    <!-- Spoke tips (circles) -->
    <circle cx="0" cy="-36" r="5" fill="#00ADD8"/>
    <circle cx="31" cy="18" r="5" fill="#00ADD8"/>
    <circle cx="-31" cy="18" r="5" fill="#00ADD8"/>
    <circle cx="0" cy="36" r="5" fill="#00ADD8"/>
    <circle cx="-31" cy="-18" r="5" fill="#00ADD8"/>
    <circle cx="31" cy="-18" r="5" fill="#00ADD8"/>
    <!-- Center dot -->
    <circle r="4" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- MCP lightning bolt overlay (bottom right) -->
  <g transform="translate(78,78)">
    <circle r="16" fill="#7C3AED" stroke="#ffffff" stroke-width="1.5"/>
    <polygon points="2,-9 -3,1 2,1 -2,9 5,0 0,0 4,-9" fill="#ffffff"/>
  </g>
</svg>
