setup:
  modDownload: true
  modTidy: false

build:
  output: dist/sh-mcp-go
  main: ./cmd/sh-mcp-go
  versionPkg: github.com/vinaycharlie01/sh-mcp-go/pkg/version
  noCGO: true

crossBuild:
  main: ./cmd/sh-mcp-go
  binary: sh-mcp-go
  outputDir: dist
  versionPkg: github.com/vinaycharlie01/sh-mcp-go/pkg/version
  platforms:
    - os: linux
      arch: amd64
    - os: linux
      arch: arm64

test:
  packages:
    - ./...
  args:
    - "-v"
    - "-short"
    - "-timeout=120s"

race:
  packages:
    - ./...
  args:
    - "-short"
    - "-timeout=120s"

coverage:
  packages:
    - ./...
  output: coverage.out
  args:
    - "-timeout=120s"

bench:
  packages:
    - ./...
  args:
    - "-timeout=120s"

lint:
  args:
    - "--timeout=10m"

vet:
  packages:
    - ./...

integration:
  packages:
    - ./internal/adapters/helm/...
  args:
    - "-tags"
    - "integration"
    - "-v"
    - "-timeout"
    - "10m"
