server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s
  shutdown_timeout: 15s

kubernetes:
  in_cluster: false
  qps: 50
  burst: 100
  timeout: 30s
  default_namespace: "default"

helm:
  repository_cache: "/tmp/sh-mcp-go/helm/cache"
  repository_config: "/tmp/sh-mcp-go/helm/repositories.yaml"
  default_timeout: 300s
  max_history: 10
  atomic: true
  wait_for_jobs: true

storage:
  driver: "sqlite"
  sqlite:
    path: "/tmp/sh-mcp-go/state.db"

observability:
  metrics_enabled: true
  tracing_enabled: false
  otlp_endpoint: "localhost:4318"
  service_name: "sh-mcp-go"
  sampling_rate: 0.1

security:
  enable_rbac_validation: false
  enable_secret_masking: true
  denied_namespaces:
    - "kube-system"
    - "kube-public"

mcp:
  transport: "stdio"
  name: "sh-mcp-go"
  version: "1.0.0"
  sse_addr: "0.0.0.0:8081"

log:
  level: "info"
  format: "json"
